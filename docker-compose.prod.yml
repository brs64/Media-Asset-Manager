services:

  btsplay-laravel:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: final
    container_name: btsplay-laravel
    restart: unless-stopped
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: prod
    working_dir: /var/www
    volumes:
      - ./.env:/var/www/.env:ro
      - /c/Archivage:/mnt/archivage:z
    networks:
      - app-network
    depends_on:
      - btsplay-mysql

  btsplay-queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: final
    container_name: btsplay-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=180 --sleep=3 --max-jobs=1000
    environment:
      SERVICE_NAME: queue
      SERVICE_TAGS: prod
    working_dir: /var/www
    volumes:
      - ./.env:/var/www/.env:ro
      - /c/Archivage:/mnt/archivage:z
    networks:
      - app-network
    depends_on:
      - btsplay-laravel

  btsplay-nginx:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: nginx
    container_name: btsplay-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - btsplay-mysql
      - btsplay-laravel

  btsplay-mysql:
    image: mysql:5.7
    container_name: btsplay-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - dbdata-prod:/var/lib/mysql:z
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata-prod:
    driver: local
